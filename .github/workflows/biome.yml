name: Biome

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.12

      - name: Run Biome
        run: biome ci .
